name: Build Night Manager

on:
  push:
    branches:
      - packaged

jobs:
  build:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Setup
        run: |
          curl -LO https://github.com/goreleaser/nfpm/releases/download/v2.45.0/nfpm_2.45.0_amd64.deb
          sudo dpkg -i nfpm_2.45.0_amd64.deb

      - name: Make tag_name
        id: vars
        run:  echo "tag_name=$(date +"%Y%m%d.${{ github.run_number }})" >> $GITHUB_ENV

      - name: Tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Night Manager Release Bot"
          git tag -a "v${TAG}" -m "Automated release v${TAG}"
          git push origin "v${TAG}"
          
      - name: Build release
        run: !
          VERSION=${{ env.tag_name }} RELEASE=1 nfpm pkg -p deb

      - name: Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.tag_name }}
          release_name: Release ${{ env.tag_name }}
          body: |
            Automated release ${{ env.tag_name }}
