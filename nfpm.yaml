# nfpm configuration file
#
# check https://nfpm.goreleaser.com/configuration for detailed usage
#
name: NightManager
arch: all
platform: linux
version: ${VERSION}
release: ${RELEASE}
version_schema: none
section: default
priority: extra
maintainer: Sean E. Russell <ser@ser1.net>
description: |
  A tool to automate night mode for Phosh
vendor: aj@dunevent.net
license: GPL 3.0
homepage: https://github.com/ajdunevent/NightManager
depends:
  - yad
  - python3
  - python3-gi
deb:
  fields:
    Bugs: https://github.com/ajdunevent/NightManager/issues
contents:
  - src: nightmanager
    dst: /usr/bin/nightmanager
    file_info:
      mode: 0755

  - src: nightmanconfig
    dst: /usr/bin/nightmanconfig
    file_info:
      mode: 0755

  - src: NightManager.png
    dst: /usr/share/icons/hicolor/128x128/apps/NightManager.png

  - src: nightmanconfig.desktop
    dst: /usr/share/applications/nightmanconfig.desktop

  - src: nightmanager-off.timer
    dst: /usr/lib/systemd/user/nightmanager-off.timer

  - src: nightmanager-on.timer
    dst: /usr/lib/systemd/user/nightmanager-on.timer

  - src: nightmanager@.service
    dst: /usr/lib/systemd/user/nightmanager@.service

  - src: nightmanager.conf
    dst: /home/furios/.config/nightmanager/nightmanager.conf
    type: config|noreplace
    file_info:
      owner: furios
      group: furios

  - src: off-override.conf
    dst: /home/furios/.config/systemd/user/nightmanager-off.timer.d/10-override.conf
    type: config|noreplace
    file_info:
      owner: furios
      group: furios
  
  - src: on-override.conf
    dst: /home/furios/.config/systemd/user/nightmanager-on.timer.d/10-override.conf
    type: config|noreplace
    file_info:
      owner: furios
      group: furios

  - src: LICENSE
    dst: /usr/share/doc/nightmanager/LICENSE

  - src: README.md
    dst: /usr/share/doc/nightmanager/README.md
scripts:
  preinstall: ./scripts/preinstall.sh
  postinstall: ./scripts/postinstall.sh
  preremove: ./scripts/preremove.sh
  postremove: ./scripts/postremove.sh
